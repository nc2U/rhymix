# Default values for mariadb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: mariadb
  tag: "10.6" # Or a specific version like "10.6.12"
  pullPolicy: IfNotPresent

auth:
  rootPassword: "your_root_password" # CHANGE THIS TO A SECURE PASSWORD
  database: "rhymix"
  username: "rhymix"
  password: "your_rhymix_password" # CHANGE THIS TO A SECURE PASSWORD

service:
  type: ClusterIP
  port: 3306

persistence:
  enabled: true
  storageClass: "local-path" # Use the local-path StorageClass
  size: 5Gi # Adjust as needed
  mountPath: "/var/lib/mysql" # Default MariaDB data path

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 1Gi
  # requests:
  #   cpu: 250m
  #   memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}